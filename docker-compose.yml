  #       condition: on-failure
  #       delay: 5s
  #     labels:
  #       - "traefik.enable=true"
  #       - "traefik.docker.network=network_public"
  #       - "traefik.http.routers.portfolio-api.rule=Host(`guimoreira.tech`) && PathPrefix(`/api`)"
  #       - "traefik.http.routers.portfolio-api.entrypoints=websecure"
  #       - "traefik.http.routers.portfolio-api.tls.certresolver=letsencryptresolver"
  #       - "traefik.http.services.portfolio-api.loadbalancer.server.port=3001"

networks:
  network_public:
    external: true   # rede já existente, gerenciada pelo Traefik
